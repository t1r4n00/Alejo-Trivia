<!DOCTYPE html>
<html>
<head>
  <title>Family Trivia</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      background: linear-gradient(180deg, #f0f4ff, #ffffff);
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 5px;
      color: #1a3d8f;
      font-weight: bold;
    }

    /* ⭐ Season 2 Banner */
    .seasonBanner {
      display: inline-block;
      background: linear-gradient(90deg, #ff7b00, #ffcc00);
      color: #222;
      padding: 8px 18px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      margin: 10px auto 20px auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      letter-spacing: 1px;
      text-align: center;
    }

    #welcomeName {
      text-align: center;
      font-size: 20px;
      margin-bottom: 20px;
      font-weight: bold;
      color: #444;
    }

    #floatingTimer {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #d9534f;
      color: white;
      padding: 10px 15px;
      border-radius: 50px;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      z-index: 9999;
    }

    p {
      font-size: 19px;
      margin-bottom: 10px;
      color: #333;
      font-weight: bold;
    }

    .option {
      display: flex;
      align-items: center;
      padding: 12px;
      background: white;
      border-radius: 6px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      font-size: 18px;
      transition: 0.15s;
    }

    .option:hover {
      background: #eef4ff;
      border-color: #bcd0ff;
    }

    .option input {
      margin-right: 10px;
      transform: scale(1.4);
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 22px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 20px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    button:hover {
      background: #155ec2;
    }
  </style>
</head>
<body>

<h1>Alejo Family Trivia</h1>

<div class="seasonBanner">SEASON 2</div>

<p id="welcomeName"></p>

<div id="floatingTimer">45</div>

<form id="quizForm">

  <p>1. Which river flows through the city of Paris?</p>
  <label class="option"><input type="radio" name="q1" value="A"> Danube</label>
  <label class="option"><input type="radio" name="q1" value="B"> Thames</label>
  <label class="option"><input type="radio" name="q1" value="C"> Seine</label>
  <label class="option"><input type="radio" name="q1" value="D"> Rhine</label>

  <p>2. Which ancient civilization built the city of Machu Picchu?</p>
  <label class="option"><input type="radio" name="q2" value="A"> Inca</label>
  <label class="option"><input type="radio" name="q2" value="B"> Maya</label>
  <label class="option"><input type="radio" name="q2" value="C"> Olmec</label>
  <label class="option"><input type="radio" name="q2" value="D"> Aztec</label>

  <p>3. Which empire controlled the city of Constantinople up until 1453?</p>
  <label class="option"><input type="radio" name="q3" value="A"> Persian</label>
  <label class="option"><input type="radio" name="q3" value="B"> Ottoman</label>
  <label class="option"><input type="radio" name="q3" value="C"> Holy Roman</label>
  <label class="option"><input type="radio" name="q3" value="D"> Byzantine</label>

  <button type="button" onclick="submitQuiz()">Submit</button>
</form>

<script>
// Load name
const savedName = localStorage.getItem("playerName") || "Unknown";
document.getElementById("welcomeName").innerText = "Player: " + savedName;

// Timer
let timeLeft = 45;
let timer = setInterval(() => {
  timeLeft--;
  document.getElementById("floatingTimer").innerText = timeLeft;

  if (timeLeft <= 0) {
    clearInterval(timer);
    submitQuiz();
  }
}, 1000);

function submitQuiz() {
  clearInterval(timer);

  const name = savedName;
  const form = document.getElementById("quizForm");
  const data = new FormData(form);

  const answers = { q1: "C", q2: "A", q3: "D" };

  let score = 0;
  let q1 = data.get("q1");
  let q2 = data.get("q2");
  let q3 = data.get("q3");

  if (q1 === answers.q1) score += 1;
  if (q2 === answers.q2) score += 2;
  if (q3 === answers.q3) score += 3;

  fetch("https://script.google.com/macros/s/AKfycbylKL_UIMQHHM9a6xPYZknJ-SNvgRAEThd4BClGzfffo8ZoJUtQSVbq1UKH1FNb7CVXjw/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      score: score,
      q1: q1,
      q2: q2,
      q3: q3
    })
  });

  form.style.display = "none";

  const resultBox = document.createElement("div");
  resultBox.style.marginTop = "30px";
  resultBox.style.padding = "20px";
  resultBox.style.background = "white";
  resultBox.style.borderRadius = "8px";
  resultBox.style.fontSize = "22px";
  resultBox.style.textAlign = "center";
  resultBox.style.boxShadow = "0 2px 6px rgba(0,0,0,0.15)";

  resultBox.innerHTML = `
    <h2>Quiz Complete!</h2>
    <p><strong>${name}</strong>, your final score is:</p>
    <p style="font-size: 40px; color: #0275d8; font-weight: bold;">${score}</p>
  `;

  document.body.appendChild(resultBox);
}

// Anti‑cheat
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());
document.addEventListener("selectstart", e => e.preventDefault());
</script>

</body>
</html>
