<!DOCTYPE html>
<html>
<head>
  <title>Family Trivia</title>

  <!-- Mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {

      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      background: #f7f7f7;

	user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 10px;
    }

    #welcomeName {
      text-align: center;
      font-size: 20px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    #timer {
      font-size: 40px;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
      color: #d9534f;
    }

    label, p {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .option {
      display: flex;
      align-items: center;
      padding: 10px;
      background: white;
      border-radius: 6px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      font-size: 18px;
    }

    .option input {
      margin-right: 10px;
      transform: scale(1.4);
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 20px;
      background: #0275d8;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 20px;
    }

    button:active {
      background: #025aa5;
    }

#floatingTimer {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #d9534f;
  color: white;
  padding: 10px 15px;
  border-radius: 50px;
  font-size: 22px;
  font-weight: bold;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  z-index: 9999;
}
	
  </style>
</head>
<body>

<h1>Alejo Family Trivia</h1>

<!-- Name loaded from welcome page -->
<p id="welcomeName"></p>

<div id="floatingTimer">45</div>

<form id="quizForm">

  <p>1. Which continent is home to the Sahara Desert?</p>
  <label class="option"><input type="radio" name="q1" value="A"> Africa</label>
  <label class="option"><input type="radio" name="q1" value="B"> Asia</label>
  <label class="option"><input type="radio" name="q1" value="C"> Australia</label>
  <label class="option"><input type="radio" name="q1" value="D"> Antarctica</label>

  <p>2. Which ancient structure was originally built as a tomb for the Egyptian Pharaoh Khufu? </p>
  <label class="option"><input type="radio" name="q2" value="A"> Temple of Karnak</label>
  <label class="option"><input type="radio" name="q2" value="B"> Great Sphinx</label>
  <label class="option"><input type="radio" name="q2" value="C"> Great Pyramid of Giza</label>
  <label class="option"><input type="radio" name="q2" value="D"> Valley of the Kings</label>

  <p>3. What is the only metal that is liquid at room temperature?</p>
  <label class="option"><input type="radio" name="q3" value="A"> Gallium</label>
  <label class="option"><input type="radio" name="q3" value="B"> Mercury</label>
  <label class="option"><input type="radio" name="q3" value="C"> Galinstan</label>
  <label class="option"><input type="radio" name="q3" value="D"> Cesium</label>

  <button type="button" onclick="submitQuiz()">Submit</button>
</form>

<script>
// Load name from welcome page
const savedName = localStorage.getItem("playerName") || "Unknown";
document.getElementById("welcomeName").innerText = "Player: " + savedName;

let timeLeft = 45;
let timer = setInterval(() => {
  timeLeft--;
  document.getElementById("floatingTimer").innerText = timeLeft;

  if (timeLeft <= 0) {
    clearInterval(timer);
    submitQuiz();
  }
}, 1000);

function submitQuiz() {
  clearInterval(timer);

  const name = savedName;
  const form = document.getElementById("quizForm");
  const data = new FormData(form);

  const answers = { q1: "A", q2: "C", q3: "B" };

  let score = 0;
  let q1 = data.get("q1");
  let q2 = data.get("q2");
  let q3 = data.get("q3");

  if (q1 === answers.q1) score += 1;
  if (q2 === answers.q2) score += 2;
  if (q3 === answers.q3) score += 3;

  // Send to Google Sheets
  fetch("https://script.google.com/macros/s/AKfycbylKL_UIMQHHM9a6xPYZknJ-SNvgRAEThd4BClGzfffo8ZoJUtQSVbq1UKH1FNb7CVXjw/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      score: score,
      q1: q1,
      q2: q2,
      q3: q3
    })
  });

  // Hide the quiz
  form.style.display = "none";

  // Show final score on the page
  const resultBox = document.createElement("div");
  resultBox.style.marginTop = "30px";
  resultBox.style.padding = "20px";
  resultBox.style.background = "white";
  resultBox.style.borderRadius = "8px";
  resultBox.style.fontSize = "22px";
  resultBox.style.textAlign = "center";
  resultBox.style.boxShadow = "0 2px 6px rgba(0,0,0,0.15)";

  resultBox.innerHTML = `
    <h2>Quiz Complete!</h2>
    <p><strong>${name}</strong>, your final score is:</p>
    <p style="font-size: 40px; color: #0275d8; font-weight: bold;">${score}</p>
  `;

  document.body.appendChild(resultBox);
}

// Disable right‑click
document.addEventListener("contextmenu", function(e) {
  e.preventDefault();
});

// Disable copy, cut, paste, and text selection
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

// Disable text selection (prevents highlighting)
document.addEventListener("selectstart", e => e.preventDefault());

</script>

</body>
</html>
