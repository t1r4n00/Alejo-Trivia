<!DOCTYPE html>
<html>
<head>
  <title>Family Trivia</title>

  <!-- Mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 10px;
    }

    #welcomeName {
      text-align: center;
      font-size: 20px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    #timer {
      font-size: 40px;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
      color: #d9534f;
    }

    label, p {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .option {
      display: flex;
      align-items: center;
      padding: 10px;
      background: white;
      border-radius: 6px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      font-size: 18px;
    }

    .option input {
      margin-right: 10px;
      transform: scale(1.4);
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 20px;
      background: #0275d8;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 20px;
    }

    button:active {
      background: #025aa5;
    }

#floatingTimer {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #d9534f;
  color: white;
  padding: 10px 15px;
  border-radius: 50px;
  font-size: 22px;
  font-weight: bold;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  z-index: 9999;
}
	
  </style>
</head>
<body>

<h1>Alejo Family Trivia</h1>

<!-- Name loaded from welcome page -->
<p id="welcomeName"></p>

<div id="floatingTimer">45</div>

<form id="quizForm">

  <p>1. What city did Braulio live in the longest growing up?</p>
  <label class="option"><input type="radio" name="q1" value="A"> Oakland</label>
  <label class="option"><input type="radio" name="q1" value="B"> Los Angeles</label>
  <label class="option"><input type="radio" name="q1" value="C"> San Leandro</label>
  <label class="option"><input type="radio" name="q1" value="D"> Gridley</label>

  <p>2. What is Braulio's favorite hobby?</p>
  <label class="option"><input type="radio" name="q2" value="A"> Soccer</label>
  <label class="option"><input type="radio" name="q2" value="B"> Softball</label>
  <label class="option"><input type="radio" name="q2" value="C"> Video games</label>
  <label class="option"><input type="radio" name="q2" value="D"> Running</label>

  <p>3. What is Braulio's favorite music genre?</p>
  <label class="option"><input type="radio" name="q3" value="A"> Country</label>
  <label class="option"><input type="radio" name="q3" value="B"> Rap</label>
  <label class="option"><input type="radio" name="q3" value="C"> Jazz</label>
  <label class="option"><input type="radio" name="q3" value="D"> Corridos</label>

  <button type="button" onclick="submitQuiz()">Submit</button>
</form>

<script>
// Load name from welcome page
const savedName = localStorage.getItem("playerName") || "Unknown";
document.getElementById("welcomeName").innerText = "Player: " + savedName;

let timeLeft = 45;
let timer = setInterval(() => {
  timeLeft--;
  document.getElementById("floatingTimer").innerText = timeLeft;

  if (timeLeft <= 0) {
    clearInterval(timer);
    submitQuiz();
  }
}, 1000);

function submitQuiz() {
  clearInterval(timer);

  const name = savedName;
  const form = document.getElementById("quizForm");
  const data = new FormData(form);

  const answers = { q1: "C", q2: "A", q3: "D" };

  let score = 0;
  let q1 = data.get("q1");
  let q2 = data.get("q2");
  let q3 = data.get("q3");

  if (q1 === answers.q1) score += 0.5;
  if (q2 === answers.q2) score += 0.5;
  if (q3 === answers.q3) score += 0.5;

  fetch("https://script.google.com/macros/s/AKfycbylKL_UIMQHHM9a6xPYZknJ-SNvgRAEThd4BClGzfffo8ZoJUtQSVbq1UKH1FNb7CVXjw/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      score: score,
      q1: q1,
      q2: q2,
      q3: q3
    })
  });

  alert("Time's up! Your score: " + score);
}
</script>

</body>
</html>
