<!DOCTYPE html>
<html>
<head>
  <title>Family Trivia</title>

  <!-- Mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    #timer {
      font-size: 40px;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
      color: #d9534f;
    }

    label, p {
      font-size: 18px;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
    }

    .option {
      display: flex;
      align-items: center;
      padding: 10px;
      background: white;
      border-radius: 6px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      font-size: 18px;
    }

    .option input {
      margin-right: 10px;
      transform: scale(1.4);
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 20px;
      background: #0275d8;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 20px;
    }

    button:active {
      background: #025aa5;
    }
  </style>
</head>
<body>

<h1>Daily Family Trivia</h1>

<label>Your Name:</label>
<input id="playerName" type="text" placeholder="Enter your name">

<div id="timer">60</div>

<form id="quizForm">

  <p>1. Which household item was originally invented to clean wallpaper?</p>
  <label class="option"><input type="radio" name="q1" value="A"> Sponge</label>
  <label class="option"><input type="radio" name="q1" value="B"> Play-Doh</label>
  <label class="option"><input type="radio" name="q1" value="C"> Baking soda</label>

  <p>2. Which Mexican leader said “El respeto al derecho ajeno es la paz”?</p>
  <label class="option"><input type="radio" name="q2" value="A"> Benito Juárez</label>
  <label class="option"><input type="radio" name="q2" value="B"> Emiliano Zapata</label>
  <label class="option"><input type="radio" name="q2" value="C"> Porfirio Díaz</label>

  <p>3. Who released the hit song “Blinding Lights”?</p>
  <label class="option"><input type="radio" name="q3" value="A"> Drake</label>
  <label class="option"><input type="radio" name="q3" value="B"> The Weeknd</label>
  <label class="option"><input type="radio" name="q3" value="C"> Bruno Mars</label>

  <button type="button" onclick="submitQuiz()">Submit</button>
</form>

<script src="script.js"></script>

</body>
</html>
