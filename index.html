<!DOCTYPE html>
<html>
<head>
  <title>Alejo Family Trivia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      background: linear-gradient(180deg, #f0f4ff, #ffffff);
      text-align: center;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 10px;
      color: #1a3d8f;
      font-weight: bold;
    }

    /* ⭐ Season 2 Banner */
    .seasonBanner {
      display: inline-block;
      background: linear-gradient(90deg, #ff7b00, #ffcc00);
      color: #222;
      padding: 8px 18px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      letter-spacing: 1px;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 5px;
      color: #444;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 25px;
      color: #666;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 20px;
      border-radius: 6px;
      border: 1px solid #bbb;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 22px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    button:hover {
      background: #155ec2;
    }

    /* Sponsor Section */
    #sponsorBox {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #ccc;
      text-align: center;
      font-size: 18px;
      color: #555;
    }

    #sponsorBox img {
      margin-top: 10px;
      max-width: 160px;
      height: auto;
      border-radius: 6px;
      opacity: 0.95;
    }
  </style>
</head>
<body>

<h1>Alejo Family Trivia</h1>

<!-- ⭐ Season 2 Badge -->
<div class="seasonBanner">SEASON 2</div>

<h2>Today's Topic: Family Member Spotlight</h2>
  <h2>This Season: Monse</h2>
<h3>Time Limit: 45 Seconds</h3>

<p style="font-size:18px;">Enter your name to begin</p>

<input id="playerName" type="text" placeholder="Your name">

<button onclick="startQuiz()">Start Quiz</button>

<script>
  function startQuiz() {
    const name = document.getElementById("playerName").value.trim();

    if (!name) {
      alert("Please enter your name");
      return;
    }

    localStorage.setItem("playerName", name);
    window.location.href = "quiz.html";
  }
</script>

<div id="sponsorBox">
  <p>Sponsored by</p>
  <img src="logo.png" alt="Sponsor Logo">
</div>

</body>
</html>
