<!DOCTYPE html>
<html>
<head>
  <title>Family Trivia</title>

  <!-- Mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    #timer {
      font-size: 40px;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
      color: #d9534f;
    }

    label, p {
      font-size: 18px;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
    }

    .option {
      display: flex;
      align-items: center;
      padding: 10px;
      background: white;
      border-radius: 6px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      font-size: 18px;
    }

    .option input {
      margin-right: 10px;
      transform: scale(1.4);
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 20px;
      background: #0275d8;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 20px;
    }

    button:active {
      background: #025aa5;
    }
  </style>
</head>
<body>

<h1>Alejo Family Trivia</h1>

<label>Your Name:</label>
<input id="playerName" type="text" placeholder="Enter your name">

<div id="timer">45</div>

<form id="quizForm">

  <p>1. In the Lion King, what kind of animal is Timon?</p>
  <label class="option"><input type="radio" name="q1" value="A"> Warthog</label>
  <label class="option"><input type="radio" name="q1" value="B"> Meerkat</label>
  <label class="option"><input type="radio" name="q1" value="C"> Hyena</label>
  <label class="option"><input type="radio" name="q1" value="D"> Lemur</label>

  <p>2. Which 1990s movie features the line "Life is like a box of chocolates"?</p>
  <label class="option"><input type="radio" name="q2" value="A"> Jerry Maguire</label>
  <label class="option"><input type="radio" name="q2" value="B"> Sleepless in Seattle</label>
  <label class="option"><input type="radio" name="q2" value="C"> The Shawshank Redemption</label>
  <label class="option"><input type="radio" name="q1" value="D"> Forrest Gump</label>

  <p>3. In Back to the Future, what year does Marty McFly travel back to when he first uses the DeLorean? </p>
  <label class="option"><input type="radio" name="q3" value="A"> 1955</label>
  <label class="option"><input type="radio" name="q3" value="B"> 1962</label>
  <label class="option"><input type="radio" name="q3" value="C"> 1947</label>
  <label class="option"><input type="radio" name="q1" value="D"> 1970</label>

  <button type="button" onclick="submitQuiz()">Submit</button>
</form>

<script src="script.js"></script>

</body>
</html>
